apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: philanthropy-os

# One entry per service. Add new services under services/<name>/base
# and reference them here.
resources:
  - namespace.yaml
  - ../../services/protonmail-bridge/base
  - ../../services/hermes-agent/base
  - ../../services/mail-indexer/base

# Sender -> grantee mapping for this environment. Copy grantees.json.example to
# grantees.json; grantees.json is gitignored (contains PII).
configMapGenerator:
  - name: mail-indexer-grantees
    files:
      - grantees.json
