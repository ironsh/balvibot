apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
spec:
  replicas: 1
  strategy:
    # The PVC is ReadWriteOnce, so a new pod cannot mount it while the old one
    # still holds it. Recreate avoids the deadlock during rollouts.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
    spec:
      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent
          args: ["gateway", "run"]
          ports:
            - name: gateway
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD
              value: "1"
          envFrom:
            # API_SERVER_KEY + provider API keys (see secrets.env).
            - secretRef:
                name: hermes-agent-secrets
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
