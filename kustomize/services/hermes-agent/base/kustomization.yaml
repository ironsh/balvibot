apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/part-of: philanthropy-os

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

# The hermes-agent-secrets Secret (API_SERVER_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY)
# is provisioned out-of-band via `just bootstrap-secrets` from the operator's shell env.

images:
  - name: nousresearch/hermes-agent
    newTag: latest
