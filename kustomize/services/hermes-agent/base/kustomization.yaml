apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: hermes-agent
      app.kubernetes.io/part-of: philanthropy-os

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

# API_SERVER_KEY and provider API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, ...).
# Copy secrets.env.example to secrets.env and fill it in; secrets.env is gitignored.
secretGenerator:
  - name: hermes-agent-secrets
    envs:
      - secrets.env

images:
  - name: nousresearch/hermes-agent
    newTag: latest
