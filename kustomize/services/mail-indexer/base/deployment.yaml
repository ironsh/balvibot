apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-indexer
spec:
  replicas: 1
  strategy:
    # The PVC is ReadWriteOnce, so a new pod cannot mount it while the old one
    # still holds it. Recreate avoids the deadlock during rollouts.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mail-indexer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mail-indexer
    spec:
      containers:
        - name: mail-indexer
          image: philanthropy-os/mail-indexer
          # Locally built image (see justfile build-mail-indexer); never pull from a registry.
          imagePullPolicy: IfNotPresent
          env:
            - name: IMAP_ADDR
              value: "protonmail-bridge.philanthropy-os.svc.cluster.local:143"
            - name: IMAP_TLS
              value: "starttls"
            - name: MAIL_DB_PATH
              value: "/opt/data/mail.db"
            - name: MAIL_ATTACHMENTS_DIR
              value: "/opt/data/attachments"
            - name: MAIL_GRANTEES_FILE
              value: "/opt/config/grantees.json"
            - name: MAIL_FOLDERS
              value: "INBOX,Sent"
            - name: MAIL_LOG_LEVEL
              value: "info"
          envFrom:
            # IMAP_USER + IMAP_PASS for the protonmail-bridge account.
            - secretRef:
                name: mail-indexer-secrets
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/config
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mail-indexer-data
        - name: config
          configMap:
            name: mail-indexer-grantees
