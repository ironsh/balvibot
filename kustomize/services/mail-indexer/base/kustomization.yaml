apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: mail-indexer
      app.kubernetes.io/part-of: philanthropy-os

resources:
  - pvc.yaml
  - deployment.yaml

# The mail-indexer-secrets Secret (IMAP_USER, IMAP_PASS) is provisioned out-of-band
# via `just bootstrap-secrets` from the operator's shell env.
#
# The mail-indexer-grantees ConfigMap (sender -> grantee mapping) is generated
# per-overlay from each overlay's own grantees.json.

images:
  - name: philanthropy-os/mail-indexer
    newTag: 0.1.0
