apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "philos.labels" (dict "name" "api" "partOf" .Values.partOf) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "philos.selectorLabels" (dict "name" "api") | nindent 4 }}
  ports:
    - name: mcp
      port: {{ .Values.api.ports.mcp }}
      targetPort: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "philos.labels" (dict "name" "api" "partOf" .Values.partOf) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "philos.selectorLabels" (dict "name" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "philos.labels" (dict "name" "api" "partOf" .Values.partOf) | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args: ["serve"]
          env:
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            # DATABASE_URL + MCP_BEARER_TOKEN.
            - secretRef:
                name: api-secrets
          ports:
            - name: mcp
              containerPort: {{ .Values.api.ports.mcp }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: mcp
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
