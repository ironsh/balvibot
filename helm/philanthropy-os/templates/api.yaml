{{- $da := .Values.api.driveAuth -}}
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "philos.labels" (dict "name" "api" "partOf" .Values.partOf) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "philos.selectorLabels" (dict "name" "api") | nindent 4 }}
  ports:
    - name: mcp
      port: {{ .Values.api.ports.mcp }}
      targetPort: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "philos.labels" (dict "name" "api" "partOf" .Values.partOf) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "philos.selectorLabels" (dict "name" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "philos.labels" (dict "name" "api" "partOf" .Values.partOf) | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args: ["serve"]
          env:
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if $da.enabled }}
            # The MCP server talks to Google Drive directly (it is a trusted
            # backend, not an agent workload, so it holds the service-account
            # credential itself — no iron-proxy). whitelist_doc uses it to
            # classify a Drive id as a folder or a doc at enqueue time.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ printf "/etc/philos/gcp-sa/%s" $da.secretKey | quote }}
            {{- end }}
          envFrom:
            # DATABASE_URL + MCP_BEARER_TOKEN.
            - secretRef:
                name: api-secrets
          {{- if $da.enabled }}
          volumeMounts:
            - name: gcp-sa
              mountPath: /etc/philos/gcp-sa
              readOnly: true
          {{- end }}
          ports:
            - name: mcp
              containerPort: {{ .Values.api.ports.mcp }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: mcp
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if $da.enabled }}
      volumes:
        - name: gcp-sa
          secret:
            secretName: {{ $da.secretName | quote }}
            items:
              - key: {{ $da.secretKey | quote }}
                path: {{ $da.secretKey | quote }}
      {{- end }}
