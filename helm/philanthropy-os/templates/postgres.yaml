apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "philos.labels" (dict "name" "postgres" "partOf" .Values.partOf) | nindent 4 }}
spec:
  # Headless service: gives the StatefulSet pod a stable DNS name
  # (postgres.<ns>.svc.cluster.local). The single replica is reached directly.
  clusterIP: None
  selector:
    {{- include "philos.selectorLabels" (dict "name" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "philos.labels" (dict "name" "postgres" "partOf" .Values.partOf) | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "philos.selectorLabels" (dict "name" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "philos.labels" (dict "name" "postgres" "partOf" .Values.partOf) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            # Keep the data dir on a subdir so the PVC root (lost+found etc.)
            # doesn't conflict with initdb.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.port }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.user }} -d {{ .Values.postgres.db }}"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgres.user }} -d {{ .Values.postgres.db }}"]
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
