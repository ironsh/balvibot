{{- $config := deepCopy .Values.hermesAgent.config -}}
{{- if .Values.hermesAgent.mailIndexer.enabled -}}
{{-   $mcp := dict "mail-indexer" (dict
        "url" "${MAIL_INDEXER_MCP_URL}"
        "headers" (dict "Authorization" "Bearer ${MAIL_INDEXER_MCP_TOKEN}")) -}}
{{-   $existing := default dict $config.mcp_servers -}}
{{-   $_ := set $config "mcp_servers" (merge $existing $mcp) -}}
{{- end -}}
{{- $skills := .Values.hermesAgent.skills -}}
{{- $ip := .Values.ironProxy -}}
{{- $soul := .Files.Get "SOUL.md" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  labels:
    {{- include "philos.labels" (dict "name" "hermes-agent" "partOf" .Values.partOf) | nindent 4 }}
data:
  # Written to /opt/data/config.yaml verbatim on every pod start by the
  # render-config init container. `${VAR}` placeholders are resolved by hermes
  # at runtime against the container's env vars.
  config.yaml: |
    {{- toYaml $config | nindent 4 }}
  # Mounted read-only at /opt/data/SOUL.md via subPath. The agent cannot
  # mutate its own system prompt; bump via chart deploy.
  SOUL.md: |
    {{- $soul | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-data
  labels:
    {{- include "philos.labels" (dict "name" "hermes-agent" "partOf" .Values.partOf) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Holds config.yaml, SOUL.md, and sessions/memories/skills/logs.
      storage: {{ .Values.hermesAgent.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  labels:
    {{- include "philos.labels" (dict "name" "hermes-agent" "partOf" .Values.partOf) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "philos.selectorLabels" (dict "name" "hermes-agent") | nindent 4 }}
  ports:
    - name: gateway
      port: {{ .Values.hermesAgent.ports.gateway }}
      targetPort: gateway
    - name: dashboard
      port: {{ .Values.hermesAgent.ports.dashboard }}
      targetPort: dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  labels:
    {{- include "philos.labels" (dict "name" "hermes-agent" "partOf" .Values.partOf) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    # The PVC is ReadWriteOnce, so a new pod cannot mount it while the old one
    # still holds it. Recreate avoids the deadlock during rollouts.
    type: Recreate
  selector:
    matchLabels:
      {{- include "philos.selectorLabels" (dict "name" "hermes-agent") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "philos.labels" (dict "name" "hermes-agent" "partOf" .Values.partOf) | nindent 8 }}
      annotations:
        # Roll pods when the rendered config, SOUL.md, or ironProxy values
        # change. (The skills bundle rolls implicitly via its image tag; the
        # iron-proxy CA Secret is intentionally not in this hash so a CA
        # rotation requires an explicit `kubectl rollout restart`.)
        checksum/config: {{ printf "%s\n%s\n%s" (toYaml $config) $soul (toYaml $ip) | sha256sum }}
    spec:
      {{- if $ip.enabled }}
      # Route DNS through iron-proxy. iron-proxy returns its own ClusterIP for
      # any non-passthrough lookup and forwards *.svc.cluster.local to coredns,
      # so MCP/Service resolution still works. Combined with the egress
      # NetworkPolicy in network-policies.yaml, hermes cannot exfiltrate to
      # any host except those iron-proxy explicitly allowlists.
      #
      # ndots:1 (not the kube default of 5) because every in-cluster URL we
      # hand hermes is already a FQDN (see philos.mailIndexer.mcpUrl /
      # philos.signalCli.httpUrl helpers). With ndots:5, glibc walks the
      # search list before trying the absolute name, producing a cascade of
      # noisy passthrough-NXDOMAIN warnings in iron-proxy for queries like
      # `signal-cli.philanthropy-os.svc.cluster.local.cluster.local`. ndots:1
      # tries FQDNs absolute first and only falls back to the search list
      # for genuine short names (which we don't use here).
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - {{ $ip.clusterIP | quote }}
        searches:
          - {{ printf "%s.svc.cluster.local" .Release.Namespace | quote }}
          - "svc.cluster.local"
          - "cluster.local"
        options:
          - name: ndots
            value: "1"
      {{- end }}
      initContainers:
        # Overwrite /opt/data/config.yaml with the chart-rendered config on
        # every pod start, so the agent boots ready-to-go without any
        # interactive `hermes-agent setup`.
        - name: render-config
          image: busybox:1.36
          command:
            - sh
            - -euc
            - cp /mnt/config/config.yaml /opt/data/config.yaml
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /mnt/config
              readOnly: true
        {{- if $skills.enabled }}
        # Copy the hermes-skills image's /skills/ tree into a pod-local
        # emptyDir, which the main container mounts read-only over
        # /opt/data/skills/{{ $skills.category }}/ as an overlay over the PVC.
        # The chart owns that category subtree; user/agent-authored skills in
        # other categories on the PVC remain writable.
        - name: init-skills
          image: "{{ $skills.image.repository }}:{{ $skills.image.tag }}"
          imagePullPolicy: {{ $skills.image.pullPolicy }}
          command:
            - sh
            - -euc
            - cp -a /skills/. /mnt/skills/
          volumeMounts:
            - name: skills
              mountPath: /mnt/skills
        {{- end }}
      containers:
        - name: hermes-agent
          image: "{{ .Values.hermesAgent.image.repository }}:{{ .Values.hermesAgent.image.tag }}"
          imagePullPolicy: {{ .Values.hermesAgent.image.pullPolicy }}
          args: ["gateway", "run"]
          ports:
            - name: gateway
              containerPort: {{ .Values.hermesAgent.ports.gateway }}
            - name: dashboard
              containerPort: {{ .Values.hermesAgent.ports.dashboard }}
          env:
            {{- range $k, $v := .Values.hermesAgent.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.hermesAgent.mailIndexer.enabled }}
            - name: MAIL_INDEXER_MCP_URL
              value: {{ include "philos.mailIndexer.mcpUrl" . | quote }}
            - name: MAIL_INDEXER_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mail-indexer-secrets
                  key: MCP_BEARER_TOKEN
            {{- end }}
            {{- if .Values.hermesAgent.signal.account }}
            - name: SIGNAL_HTTP_URL
              value: {{ include "philos.signalCli.httpUrl" . | quote }}
            - name: SIGNAL_ACCOUNT
              value: {{ .Values.hermesAgent.signal.account | quote }}
            - name: SIGNAL_REQUIRE_MENTION
              value: {{ .Values.hermesAgent.signal.requireMention | quote }}
            {{- with .Values.hermesAgent.signal.allowedUsers }}
            - name: SIGNAL_ALLOWED_USERS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.hermesAgent.signal.groupAllowedUsers }}
            - name: SIGNAL_GROUP_ALLOWED_USERS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.hermesAgent.signal.homeChannel }}
            - name: SIGNAL_HOME_CHANNEL
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if $ip.enabled }}
            # Trust the iron-proxy CA so MITM'd TLS verifies. Set vars for the
            # major TLS stacks hermes might use; harmless when the binary
            # ignores them. No HTTPS_PROXY needed: egress reaches iron-proxy
            # via the dnsPolicy override above — the proxy's DNS server hands
            # out its own ClusterIP for every non-passthrough lookup, so
            # standard connect(api.anthropic.com, 443) lands on iron-proxy:443
            # transparently.
            - name: SSL_CERT_FILE
              value: /etc/ssl/iron-proxy/ca.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/ssl/iron-proxy/ca.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/iron-proxy/ca.crt
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/iron-proxy/ca.crt
            # Hermes only sees these static placeholders — iron-proxy swaps them
            # for the real keys (held in iron-proxy-secrets) at the wire.
            - name: ANTHROPIC_API_KEY
              value: {{ $ip.proxyTokens.anthropic | quote }}
            - name: OPENAI_API_KEY
              value: {{ $ip.proxyTokens.openai | quote }}
            {{- end }}
          envFrom:
            # API_SERVER_KEY (gateway auth). Real provider keys live in
            # iron-proxy-secrets and only the iron-proxy pod reads them —
            # hermes itself never sees them when ironProxy.enabled.
            - secretRef:
                name: hermes-agent-secrets
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # Single-file overlay at /opt/data/SOUL.md. subPath mounts a single
            # configmap key in place over whatever the PVC has there; readOnly
            # so the agent cannot rewrite its own system prompt at runtime.
            # The checksum/config annotation rolls the pod when SOUL.md
            # changes (subPath mounts don't auto-refresh).
            - name: config
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
              readOnly: true
            {{- if $skills.enabled }}
            # Overlay over /opt/data/skills/<category>/. Mounting deeper than
            # the `data` mount shadows that subpath in the PVC; readOnly so
            # the agent can't mutate chart-bundled skills.
            - name: skills
              mountPath: /opt/data/skills/{{ $skills.category }}
              readOnly: true
            {{- end }}
            {{- if $ip.enabled }}
            # CA cert only — never mount ca.key into the hermes container.
            - name: iron-proxy-ca
              mountPath: /etc/ssl/iron-proxy/ca.crt
              subPath: ca.crt
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.hermesAgent.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config
          configMap:
            name: hermes-agent-config
        {{- if $skills.enabled }}
        - name: skills
          emptyDir: {}
        {{- end }}
        {{- if $ip.enabled }}
        - name: iron-proxy-ca
          secret:
            secretName: iron-proxy-ca
            # Hermes only ever needs the cert. Drop the key from the projected
            # volume so even a container escape can't read it via /etc/ssl/...
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
