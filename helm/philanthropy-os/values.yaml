partOf: philanthropy-os

protonmailBridge:
  image:
    repository: philanthropy-os/protonmail-bridge
    tag: v3.19.0
    pullPolicy: IfNotPresent
  storage: 100Mi
  ports:
    smtp: 25
    imap: 143

mailIndexer:
  image:
    repository: philanthropy-os/mail-indexer
    tag: 0.1.0
    pullPolicy: IfNotPresent
  storage: 20Gi
  ports:
    mcp: 8080
  env:
    IMAP_TLS: "starttls"
    MAIL_DB_PATH: "/opt/data/mail.db"
    MAIL_ATTACHMENTS_DIR: "/opt/data/attachments"
    MAIL_GRANTEES_FILE: "/opt/config/grantees.json"
    MAIL_FOLDERS: "INBOX,Sent"
    MAIL_LOG_LEVEL: "info"
    MCP_ENABLED: "true"
    MCP_BIND_ADDR: ":8080"
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # Sender -> grantee mapping. Inject via `helm ... --set-file mailIndexer.grantees=...`
  # so the file (PII) stays out of values.yaml/git.
  # MCP_BEARER_TOKEN is injected via the mail-indexer-secrets Secret built by
  # `just bootstrap-secrets` (PHILOS_MAIL_INDEXER_MCP_TOKEN).
  grantees: ""

signalCli:
  image:
    repository: philanthropy-os/signal-cli
    tag: 0.14.3
    pullPolicy: IfNotPresent
  storage: 1Gi
  ports:
    http: 8080
  resources:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

hermesAgent:
  image:
    repository: nousresearch/hermes-agent
    tag: latest
    pullPolicy: IfNotPresent
  storage: 5Gi
  ports:
    gateway: 8642
    dashboard: 9119
  env:
    API_SERVER_ENABLED: "true"
    API_SERVER_HOST: "0.0.0.0"
    HERMES_DASHBOARD: "1"
    GATEWAY_ALLOW_ALL_USERS: "true"
  # Signal integration. Leave `account` empty to disable: when unset, no
  # SIGNAL_* env vars are emitted and hermes runs without a Signal dependency.
  # SIGNAL_HTTP_URL is derived from the in-cluster signal-cli Service.
  signal:
    account: ""              # E.164 phone number, e.g. "+1234567890"
    allowedUsers: ""         # comma-separated E.164 numbers or UUIDs
    groupAllowedUsers: ""    # comma-separated group IDs, or "*" for all; omit to disable groups
    homeChannel: ""          # default delivery target for cron jobs
    requireMention: false
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
