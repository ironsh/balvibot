{{- $da := .Values.api.driveAuth -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdocs-indexer
  labels:
    {{- include "balvibot.labels" (dict "name" "gdocs-indexer" "partOf" .Values.partOf) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "balvibot.selectorLabels" (dict "name" "gdocs-indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "balvibot.labels" (dict "name" "gdocs-indexer" "partOf" .Values.partOf) | nindent 8 }}
    spec:
      containers:
        - name: gdocs-indexer
          image: "{{ include "balvibot.image" (dict "registry" $.Values.imageRegistry "image" .Values.api.image) }}"
          imagePullPolicy: {{ include "balvibot.imagePullPolicy" (dict "image" .Values.api.image "default" $.Values.imagePullPolicy) }}
          args: ["sync-gdocs"]
          env:
            {{- range $k, $v := .Values.gdocsIndexer.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # The indexer talks to Google Drive directly with the
            # service-account credential (no iron-proxy).
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ printf "/etc/balvibot/gcp-sa/%s" $da.secretKey | quote }}
          envFrom:
            # DATABASE_URL.
            - secretRef:
                name: api-secrets
          volumeMounts:
            - name: gcp-sa
              mountPath: /etc/balvibot/gcp-sa
              readOnly: true
          resources:
            {{- toYaml .Values.gdocsIndexer.resources | nindent 12 }}
      volumes:
        - name: gcp-sa
          secret:
            secretName: {{ $da.secretName | quote }}
            items:
              - key: {{ $da.secretKey | quote }}
                path: {{ $da.secretKey | quote }}
