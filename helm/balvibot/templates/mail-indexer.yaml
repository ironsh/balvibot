apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mail-indexer-data
  labels:
    {{- include "balvibot.labels" (dict "name" "mail-indexer" "partOf" .Values.partOf) | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Holds the content-addressable attachments tree. Mail metadata/bodies
      # now live in Postgres; this PVC is attachments-only.
      storage: {{ .Values.mailIndexer.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-indexer
  labels:
    {{- include "balvibot.labels" (dict "name" "mail-indexer" "partOf" .Values.partOf) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    # The attachments PVC is ReadWriteOnce, so a new pod cannot mount it while
    # the old one still holds it. Recreate avoids the deadlock during rollouts.
    type: Recreate
  selector:
    matchLabels:
      {{- include "balvibot.selectorLabels" (dict "name" "mail-indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "balvibot.labels" (dict "name" "mail-indexer" "partOf" .Values.partOf) | nindent 8 }}
    spec:
      containers:
        - name: mail-indexer
          image: "{{ include "balvibot.image" (dict "registry" $.Values.imageRegistry "image" .Values.api.image) }}"
          imagePullPolicy: {{ include "balvibot.imagePullPolicy" (dict "image" .Values.api.image "default" $.Values.imagePullPolicy) }}
          args: ["index-mail"]
          env:
            - name: IMAP_ADDR
              value: {{ include "balvibot.protonmailBridge.imapAddr" . | quote }}
            {{- range $k, $v := .Values.mailIndexer.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            # DATABASE_URL + IMAP_USER + IMAP_PASS.
            - secretRef:
                name: api-secrets
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            {{- toYaml .Values.mailIndexer.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mail-indexer-data
