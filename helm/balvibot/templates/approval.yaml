apiVersion: v1
kind: Service
metadata:
  name: approval
  labels:
    {{- include "balvibot.labels" (dict "name" "approval" "partOf" .Values.partOf) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "balvibot.selectorLabels" (dict "name" "approval") | nindent 4 }}
  ports:
    - name: approval
      port: {{ .Values.approval.ports.approval }}
      targetPort: approval
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval
  labels:
    {{- include "balvibot.labels" (dict "name" "approval" "partOf" .Values.partOf) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "balvibot.selectorLabels" (dict "name" "approval") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "balvibot.labels" (dict "name" "approval" "partOf" .Values.partOf) | nindent 8 }}
    spec:
      containers:
        - name: approval
          image: "{{ include "balvibot.image" (dict "registry" $.Values.imageRegistry "image" .Values.approval.image) }}"
          imagePullPolicy: {{ include "balvibot.imagePullPolicy" (dict "image" .Values.approval.image "default" $.Values.imagePullPolicy) }}
          args: ["approve-serve"]
          env:
            - name: APPROVAL_BIND_ADDR
              value: ":{{ .Values.approval.ports.approval }}"
            {{- range $k, $v := .Values.approval.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            # DATABASE_URL.
            - secretRef:
                name: api-secrets
          ports:
            - name: approval
              containerPort: {{ .Values.approval.ports.approval }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: approval
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: approval
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.approval.resources | nindent 12 }}
