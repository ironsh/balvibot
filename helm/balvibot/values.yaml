partOf: balvibot

# Registry prefix prepended to every locally-built image (api, protonmail-bridge,
# hermes-agent, hermes-skills). Empty here so the committed chart
# stays environment-agnostic and resolves these from the node's containerd store
# as before. Set it in values.local.yaml (gitignored) to pull from the on-node
# registry instead, matching the push target in the justfile, e.g.:
#   imageRegistry: localhost:5000
# Public images (postgres, busybox, iron-proxy) ignore this and keep pulling
# from their upstream registries.
imageRegistry: ""

# Default imagePullPolicy for the locally-built images. Always because those
# images ship under fixed tags (e.g. api:0.1.0): with IfNotPresent the kubelet
# would keep serving whatever it already cached for that tag and never pick up a
# fresh push. Pulls hit the on-node registry, so Always is cheap. Override
# chart-wide here (or per image via that image's `pullPolicy`) — e.g. set
# IfNotPresent in values.local.yaml if you bump tags per build instead. Public
# images keep their own pullPolicy and ignore this.
imagePullPolicy: Always

protonmailBridge:
  image:
    repository: balvibot/protonmail-bridge
    tag: v3.19.0
  storage: 100Mi
  ports:
    smtp: 25
    imap: 143

# In-cluster Postgres: the single source of truth for grantees, mail, and docs.
# All three api workloads (api/mail-indexer/gdocs-indexer) plus the migrate Job
# connect to it. POSTGRES_PASSWORD comes from the postgres-secrets Secret built
# by `just bootstrap-secrets` (BALVIBOT_POSTGRES_PASSWORD); DATABASE_URL (built
# from the same password) lives in api-secrets.
postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  db: balvibot
  # The official image makes POSTGRES_USER a superuser, which the init
  # migration needs for `CREATE EXTENSION citext`.
  user: balvibot
  storage: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# The consolidated backend image. One binary, run as several Deployments via
# subcommands (serve / index-mail / sync-gdocs) plus a migrate Job.
api:
  image:
    repository: balvibot/api
    tag: 0.1.0
  ports:
    mcp: 8080
  # serve (MCP) env. DATABASE_URL + MCP_BEARER_TOKEN come from api-secrets.
  env:
    MCP_BIND_ADDR: ":8080"
    LOG_LEVEL: "info"
  # Google Drive service-account credential, shared by the workloads that talk
  # to Drive directly: the MCP server (whitelist_doc's folder-vs-doc
  # classification) and the gdocs indexer. They are trusted backends, so they
  # hold the key and call Drive directly — no iron-proxy. The Secret is
  # provisioned by `just bootstrap-secrets` from BALVIBOT_GCP_SA_KEY_FILE.
  driveAuth:
    secretName: gdrive-sa
    secretKey: key.json
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  migrateResources:
    requests:
      cpu: "50m"
      memory: 64Mi
    limits:
      cpu: "500m"
      memory: 256Mi

# approve-serve worker. Uses the `api` image; runs the approval service (agent
# MCP enqueue endpoint + operator approval REST API). DATABASE_URL +
# APPROVAL_BEARER_TOKEN come from api-secrets.
approval:
  image:
    repository: balvibot/api
    tag: 0.1.0
  ports:
    approval: 8090
  env:
    LOG_LEVEL: "info"
  resources:
    requests:
      cpu: "50m"
      memory: 128Mi
    limits:
      cpu: "500m"
      memory: 256Mi

# index-mail worker. Uses the `api` image; this block only carries the
# attachments PVC size, the mail env, and resources.
mailIndexer:
  # Content-addressable attachments tree (mail metadata/bodies live in Postgres).
  storage: 20Gi
  env:
    IMAP_TLS: "starttls"
    MAIL_ATTACHMENTS_DIR: "/opt/data/attachments"
    MAIL_FOLDERS: "INBOX,Sent"
    LOG_LEVEL: "info"
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# sync-gdocs worker. Uses the `api` image; no PVC (docs live in Postgres).
gdocsIndexer:
  env:
    GDOCS_POLL_INTERVAL: "5m"
    LOG_LEVEL: "info"
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

ironProxy:
  enabled: true
  image:
    repository: ironsh/iron-proxy
    tag: latest
    pullPolicy: IfNotPresent
  # Pinned ClusterIP. Required because hermes-agent's dnsConfig.nameservers is
  # rendered into the Pod spec at chart-template time (Kubernetes requires
  # literal IPs there), and iron-proxy's own DNS server hands out this same
  # IP for every non-passthrough lookup — so client and server must agree on
  # it ahead of time. k3s defaults the Service CIDR to 10.43.0.0/16; pick any
  # free IP in your cluster's range.
  clusterIP: "10.43.42.42"
  # Cluster DNS resolver iron-proxy forwards passthrough lookups to (i.e.
  # *.svc.cluster.local — anything that should resolve to a real in-cluster
  # IP, not be funneled through the proxy). k3s default coredns ClusterIP is
  # 10.43.0.10.
  upstreamResolver: "10.43.0.10:53"
  ports:
    dns: 53
    http: 80
    https: 443
    metrics: 9090
  # Default-deny egress allowlist. Hermes can only reach hosts on this list;
  # everything else terminates inside iron-proxy with a 403 / refused CONNECT.
  allowedDomains:
    - "api.anthropic.com"
    - "api.openai.com"
    # PyPI: pypi.org serves the index/JSON API, files.pythonhosted.org serves
    # the actual wheel/sdist downloads. Both are needed for `pip install` to
    # work; allowing only one stalls at the download step.
    - "pypi.org"
    - "files.pythonhosted.org"
  # Static placeholders hermes sends as its API key; iron-proxy matches them
  # in the authorization / x-api-key headers and substitutes the real value
  # from iron-proxy-secrets at the wire. Safe to commit: they grant nothing
  # on their own and never leave the cluster.
  proxyTokens:
    anthropic: "ironproxy-anthropic-placeholder"
    openai: "ironproxy-openai-placeholder"
  resources:
    requests:
      cpu: "50m"
      memory: 64Mi
    limits:
      cpu: "500m"
      memory: 256Mi

signalCli:
  image:
    repository: ghcr.io/asamk/signal-cli
    tag: 0.14.5-native
    pullPolicy: IfNotPresent
  storage: 1Gi
  ports:
    http: 8080
  resources:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

hermesAgent:
  # Custom image: upstream nousresearch/hermes-agent v2026.5.29.2 with the
  # require_mention Signal fix (#36088) baked in. Built + shipped by
  # `just ship-hermes-agent` (see docker/hermes-agent/). Keep this tag in sync
  # with hermes_agent_tag in the justfile.
  image:
    repository: balvibot/hermes-agent
    tag: v2026.5.29.2-mention1
  # RuntimeClass for the hermes pod. kata-deploy creates one RuntimeClass per
  # shim it installs (e.g. kata-qemu, kata-clh, kata-fc). Set empty to use the
  # node's default container runtime instead of a Kata VM.
  runtimeClassName: kata-qemu
  storage: 5Gi
  ports:
    gateway: 8642
    dashboard: 9119
  # Optional NodePort for the dashboard. `kubectl port-forward` to the
  # dashboard port fails under Kata (the listener is inside the VM, but
  # port-forward dials loopback in the host netns), so a NodePort is the
  # straightforward way to reach the UI from a browser on the LAN.
  dashboard:
    nodePort:
      enabled: true
      port: 30119
  env:
    API_SERVER_ENABLED: "true"
    API_SERVER_HOST: "0.0.0.0"
    HERMES_DASHBOARD: "1"
    HERMES_DASHBOARD_INSECURE: "1"
    GATEWAY_ALLOW_ALL_USERS: "true"
  # Rendered verbatim into /opt/data/config.yaml on every pod start by an init
  # container, so the agent boots ready-to-go (no `hermes-agent setup` needed).
  # Secrets (API keys) are injected via envFrom -> hermes-agent-secrets.
  # Hermes no longer uses LLM_MODEL for model selection. The model stanza below
  # is the runtime source of truth and may be overridden with Helm values.
  config:
    model:
      provider: custom
      default: Qwen3.5-9B-Q4_K_M.gguf
      base_url: http://host.docker.internal:8080/v1
      api_key: ""
      api_mode: chat_completions
      context_length: 131072
  # Extra access for a custom model endpoint. Use allowedDomains for hostnames
  # that should flow through iron-proxy. Use networkPolicyEgress for direct
  # routes to an egress gateway, service pods, or IP-backed external endpoint.
  customModelEgress:
    enabled: true
    allowedDomains: []
    networkPolicyEgress: []
  # api MCP integration. When enabled, an mcp_servers.balvibot-api entry is
  # merged into the rendered config.yaml, and BALVIBOT_API_MCP_URL /
  # BALVIBOT_API_MCP_TOKEN are injected so hermes resolves them at runtime. This
  # single endpoint exposes all grantee + mail + docs tools.
  api:
    enabled: true
  # Chart-bundled built-in hermes skills. The hermes-skills image is a tiny
  # busybox-based bundle whose contents are synced by an init container into
  # /opt/data/skills/<category>/ on the PVC. The directory stays writable so
  # Hermes can patch bundled skills or create new ones with skill_manage.
  skills:
    enabled: true
    category: balvibot
    image:
      repository: balvibot/hermes-skills
      tag: 0.3.0
  # Signal integration. Leave `account` empty to disable: when unset, no
  # SIGNAL_* env vars are emitted and hermes runs without a Signal dependency.
  # SIGNAL_HTTP_URL is derived from the in-cluster signal-cli Service.
  signal:
    account: ""              # E.164 phone number, e.g. "+1234567890"
    allowedUsers: ""         # comma-separated E.164 numbers or UUIDs
    groupAllowedUsers: ""    # comma-separated group IDs, or "*" for all; omit to disable groups
    homeChannel: ""          # default delivery target for cron jobs
    requireMention: false
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
